          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull Docker image
        run: docker pull ghcr.io/ponylang/ponyup-ci-alpine3.23-bootstrap-tester:20260201
      - name: Bootstrap test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/root/project \
            -w /root/project \
            -e SSL=libressl \
