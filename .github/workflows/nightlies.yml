name: Nightlies

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  packages: write

jobs:
  # Currently, GitHub actions supplied by GH like checkout and cache do not work
  # in musl libc environments on arm64. We can work around this by running
  # those actions on the host and then "manually" doing our work that would
  # normally be done "in the musl container" by starting the container ourselves
  # for various steps by invoking docker directly.
  #
  # This is not in line with our standard pattern of "just do it all in the
  # container" but is required to work around the GitHub actions limitation
  # documented above.
  arm64-unknown-linux-nightly:
    name: Build and upload arm64-unknown-linux-nightly
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Pull Docker image
        run: docker pull ghcr.io/ponylang/shared-docker-ci-standard-builder-with-libressl-4.2.1:release
      - name: Build and upload
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/root/project \
            -w /root/project \
            -e CLOUDSMITH_API_KEY=${{ secrets.CLOUDSMITH_API_KEY }} \
            -e GITHUB_REPOSITORY=${{ github.repository }} \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e GITHUB_ACTOR=${{ github.actor }} \
            ghcr.io/ponylang/shared-docker-ci-standard-builder-with-libressl-4.2.1:release \
            bash .ci-scripts/release/arm64-unknown-linux-nightly.bash
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  x86-64-unknown-linux-nightly:
    name: Build and upload x86-64-unknown-linux-nightly
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ponylang/shared-docker-ci-standard-builder-with-libressl-4.2.1:release
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build and upload
        run: bash .ci-scripts/release/x86-64-unknown-linux-nightly.bash
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  x86-64-pc-windows-msvc-nightly:
    name: Build and upload x86-64-pc-windows-msvc-nightly
    runs-on: windows-2025-vs2026
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - uses: actions/checkout@v6.0.2
      - name: install pony tools
        run: |
          Invoke-WebRequest https://dl.cloudsmith.io/public/ponylang/releases/raw/versions/latest/ponyc-x86-64-pc-windows-msvc.zip -OutFile C:\ponyc.zip;
          Expand-Archive -Force -Path C:\ponyc.zip -DestinationPath C:\ponyc;
          Invoke-WebRequest https://dl.cloudsmith.io/public/ponylang/releases/raw/versions/latest/corral-x86-64-pc-windows-msvc.zip -OutFile C:\corral.zip;
          Expand-Archive -Force -Path C:\corral.zip -DestinationPath C:\ponyc;
      - name: Cache LibreSSL libs
        id: cache-libressl
        uses: actions/cache@v5.0.3
        with:
          path: |
            ssl.lib
            crypto.lib
            tls.lib
          key: libressl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.ci-scripts/windows-install-libressl.ps1') }}
      - name: Install LibreSSL
        if: steps.cache-libressl.outputs.cache-hit != 'true'
        run: .ci-scripts\windows-install-libressl.ps1
      - name: Build and upload
        run: |
          # Fail the step on the first failing native command; pwsh treats a
          # non-zero native exit as non-fatal by default.
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python.exe -m pip install --upgrade cloudsmith-cli
          $env:PATH = 'C:\ponyc\bin;' + $env:PATH;
          .\make.ps1 -Command fetch;
          .\make.ps1 -Command build;
          .\make.ps1 -Command install;
          .\make.ps1 -Command package;
          $version = (Get-Date).ToString("yyyyMMdd"); cloudsmith push raw --version $version  --api-key $env:CLOUDSMITH_API_KEY --summary "The Pony toolchain multiplexer" --description "https://github.com/ponylang/ponyup" ponylang/nightlies build\ponyup-x86-64-pc-windows-msvc.zip
          # Additionally publish to GHCR, reusing $version so both destinations
          # get the same date.
          python .ci-scripts\release\ghcr_nightly.py push ponyup x86-64-pc-windows-msvc $version build\ponyup-x86-64-pc-windows-msvc.zip
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  arm64-pc-windows-msvc-nightly:
    name: Build and upload arm64-pc-windows-msvc-nightly
    runs-on: windows-11-arm
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - uses: actions/checkout@v6.0.2
      - name: install pony tools
        run: |
          Invoke-WebRequest https://dl.cloudsmith.io/public/ponylang/releases/raw/versions/latest/ponyc-arm64-pc-windows-msvc.zip -OutFile C:\ponyc.zip;
          Expand-Archive -Force -Path C:\ponyc.zip -DestinationPath C:\ponyc;
          Invoke-WebRequest https://dl.cloudsmith.io/public/ponylang/releases/raw/versions/latest/corral-arm64-pc-windows-msvc.zip -OutFile C:\corral.zip;
          Expand-Archive -Force -Path C:\corral.zip -DestinationPath C:\ponyc;
      - name: Cache LibreSSL libs
        id: cache-libressl
        uses: actions/cache@v5.0.3
        with:
          path: |
            ssl.lib
            crypto.lib
            tls.lib
          key: libressl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.ci-scripts/windows-install-libressl.ps1') }}
      - name: Install LibreSSL
        if: steps.cache-libressl.outputs.cache-hit != 'true'
        run: .ci-scripts\windows-install-libressl.ps1
      - name: Build and upload
        run: |
          # Fail the step on the first failing native command; pwsh treats a
          # non-zero native exit as non-fatal by default.
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          # Pin cloudsmith-cli below 1.19.0: 1.19.0 added a PyJWT[crypto]
          # dependency that pulls in cryptography, which has no prebuilt
          # win_arm64 wheel and fails to build from source on this runner.
          # Remove once arm64 Windows can install the latest cloudsmith-cli
          # again.
          python.exe -m pip install --upgrade "cloudsmith-cli<1.19.0"
          $env:PATH = 'C:\ponyc\bin;' + $env:PATH;
          .\make.ps1 -Command fetch;
          .\make.ps1 -Command build;
          .\make.ps1 -Command install;
          .\make.ps1 -Command package;
          $version = (Get-Date).ToString("yyyyMMdd"); cloudsmith push raw --version $version  --api-key $env:CLOUDSMITH_API_KEY --summary "The Pony toolchain multiplexer" --description "https://github.com/ponylang/ponyup" ponylang/nightlies build\ponyup-arm64-pc-windows-msvc.zip
          # Additionally publish to GHCR, reusing $version so both destinations
          # get the same date.
          python .ci-scripts\release\ghcr_nightly.py push ponyup arm64-pc-windows-msvc $version build\ponyup-arm64-pc-windows-msvc.zip
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  x86-64-apple-darwin-nightly:
    name: Build and upload x86-64-apple-darwin-nightly
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6.0.2
      - name: install pony tools
        run:  bash .ci-scripts/macos-x86-install-pony-tools.bash release
      - name: brew install dependencies
        run: |
          brew update
          brew install coreutils
      - name: pip install dependencies
        run: pip3 install --break-system-packages --upgrade cloudsmith-cli
      - name: Build and upload
        run: bash .ci-scripts/release/x86-64-apple-darwin-nightly.bash
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  arm64-apple-darwin-nightly:
    name: Build and upload arm64-apple-darwin-nightly
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6.0.2
      - name: install pony tools
        run:  bash .ci-scripts/macos-arm64-install-pony-tools.bash release
      - name: brew install dependencies
        run: |
          brew update
          brew install coreutils
      - name: pip install dependencies
        run: pip3 install --upgrade --break-system-packages cloudsmith-cli
      - name: Build and upload
        run: bash .ci-scripts/release/arm64-apple-darwin-nightly.bash
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  prune-old-nightlies:
    name: Prune GHCR nightlies older than 90 days
    runs-on: ubuntu-latest
    # This job must depend on EVERY platform publish job above. If a new
    # platform is added, add its job here too: otherwise its freshly published
    # artifact could be eligible for deletion before it is ever pulled. The
    # dependency list, not the individual platform job, is what breaks if this
    # falls out of sync, so the invariant is documented here.
    needs:
      - arm64-unknown-linux-nightly
      - x86-64-unknown-linux-nightly
      - x86-64-pc-windows-msvc-nightly
      - arm64-pc-windows-msvc-nightly
      - x86-64-apple-darwin-nightly
      - arm64-apple-darwin-nightly
    steps:
      - name: Prune
        # v3.0.1
        uses: snok/container-retention-policy@3b0972b2276b171b212f8c4efbca59ebba26eceb
        with:
          account: ponylang
          token: ${{ secrets.DELETE_PACKAGES_TOKEN }}
          image-names: "nightly/ponyup-*"
          tag-selection: tagged
          cut-off: 90d
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
