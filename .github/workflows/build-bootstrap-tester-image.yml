name: Build Bootstrap Tester Image

on:
  workflow_dispatch:
    inputs:
      builder-name:
        description: "Bootstrap tester"
        required: true
        type: choice
        options:
          - alpine3.21-bootstrap-tester
          - alpine3.22-bootstrap-tester
          - alpine3.23-bootstrap-tester
          - ubuntu24.04-bootstrap-tester
          - ubuntu26.04-bootstrap-tester

permissions:
  packages: write

jobs:
  alpine3_21-bootstrap-tester:
    if: ${{ github.event.inputs.builder-name == 'alpine3.21-bootstrap-tester' }}
    runs-on: ubuntu-latest

    name: alpine3.21-bootstrap-tester
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: v0.23.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: bash .ci-dockerfiles/alpine3.21-bootstrap-tester/build-and-push.bash

  alpine3_22-bootstrap-tester:
    if: ${{ github.event.inputs.builder-name == 'alpine3.22-bootstrap-tester' }}
    runs-on: ubuntu-latest

    name: alpine3.22-bootstrap-tester
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: v0.23.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: bash .ci-dockerfiles/alpine3.22-bootstrap-tester/build-and-push.bash

  alpine3_23-bootstrap-tester:
    if: ${{ github.event.inputs.builder-name == 'alpine3.23-bootstrap-tester' }}
    runs-on: ubuntu-latest

    name: alpine3.23-bootstrap-tester
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: v0.23.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: bash .ci-dockerfiles/alpine3.23-bootstrap-tester/build-and-push.bash

  ubuntu24_04-bootstrap-tester:
    if: ${{ github.event.inputs.builder-name == 'ubuntu24.04-bootstrap-tester' }}
    runs-on: ubuntu-latest

    name: ubuntu24.04-bootstrap-tester
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: v0.23.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: bash .ci-dockerfiles/ubuntu24.04-bootstrap-tester/build-and-push.bash

  ubuntu26_04-bootstrap-tester:
    if: ${{ github.event.inputs.builder-name == 'ubuntu26.04-bootstrap-tester' }}
    runs-on: ubuntu-latest

    name: ubuntu26.04-bootstrap-tester
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
